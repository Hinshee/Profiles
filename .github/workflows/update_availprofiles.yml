name: Update AvailProfiles

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-availprofiles:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Create or update branch
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/heads/availprofiles; then
            git checkout availprofiles
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git rebase origin/main
          else
            git checkout -b availprofiles
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install jq

      - name: Update AvailProfiles.json
        run: python .github/scripts/update_availprofiles.py

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add AvailProfiles.json
          git commit -m 'Update AvailProfiles.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push changes
        run: |
          git push --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing pull request
        id: check_pr
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pullRequests } = await github.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:availprofiles`
            });
            return pullRequests.length > 0;

      - name: Create Pull Request
        if: steps.check_pr.outputs.result == 'false'
        uses: peter-evans/create-pull-request@v7.0.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: availprofiles
          title: 'Update AvailProfiles'
          body: 'This PR updates AvailProfiles.json with the latest changes.'
          commit-message: 'Update AvailProfiles.json'
